<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grill Time</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}
.hero {
  padding: 60px 20px;
}
h1 {
  font-size: 40px;
}
button {
  margin: 10px;
  padding: 15px 25px;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}
.gold {
  background: #d4af37;
  color: black;
}
.dark {
  background: #222;
  color: white;
}
</style>
</head>

<body>

<div class="hero">
  <h1>GRILL TIME</h1>
  <p>Fast service, premium taste</p>

  <button class="gold">Call Now</button>
  <button class="gold">Order</button>
  <button class="dark">View Menu</button>
</div>
<div class="menu">
  <h2>Menu</h2>

  <div class="item">
    <img src="https://via.placeholder.com/150" alt="Burger">
    <h3>Burger</h3>
    <p>€8</p>
    <button>Order</button>
  </div>

  <div class="item">
    <img src="https://via.placeholder.com/150" alt="Pizza">
    <h3>Pizza</h3>
    <p>€10</p>
    <button>Order</button>
  </div>

</div>
</body>
</html>
